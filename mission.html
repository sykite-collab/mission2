<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우주 탐험대 - 미션 대시보드</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a2e; color: #fff; padding: 20px; text-align: center; }
        h1 { color: #4ecca3; }
        .container { max-width: 600px; margin: 0 auto; background: #16213e; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 15px rgba(0,0,0,0.5); }
        input, button { padding: 12px; font-size: 16px; border-radius: 5px; border: none; margin: 5px; }
        input { width: 60%; text-align: center; color: #000; }
        button { background-color: #e94560; color: white; cursor: pointer; font-weight: bold; }
        .dashboard-table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #fff; }
        .dashboard-table th, .dashboard-table td { border: 1px solid #0f3460; padding: 12px; text-align: center; }
        .dashboard-table th { background-color: #0f3460; }
        .progress-bar { background: #555; border-radius: 5px; overflow: hidden; display: inline-block; width: 100px; height: 15px; vertical-align: middle; margin-right: 5px; }
        .progress-fill { background: #4ecca3; height: 100%; width: 0%; transition: width 0.3s; }
        .hidden { display: none; }
        .qr-simulation { margin-top: 20px; padding: 15px; background: #0f3460; border-radius: 5px; }
        .scanner-view { background: #000; padding: 30px; border: 2px dashed #4ecca3; border-radius: 10px; margin: 20px 0; position: relative; }
        .scanner-laser { position: absolute; left: 0; right: 0; height: 3px; background: #e94560; animation: scan 1.5s infinite linear; }
        @keyframes scan { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 우주 탐험대 미션 시스템</h1>
        
        <div id="login-screen">
            <p>대원 또는 선생님의 이름을 입력해 주세요.</p>
            <input type="text" id="username-input" placeholder="이름 입력 (예: 김제이, 이시연)">
            <button onclick="login()">입장</button>
        </div>

        <div id="student-screen" class="hidden">
            <h2 id="student-welcome"></h2>
            <p id="student-target"></p>
            <div style="background: #0f3460; padding: 15px; border-radius: 10px; margin: 20px 0;">
                <p style="margin:0; color:#4ecca3; font-weight:bold;">현재 내가 찾은 보물 개수</p>
                <h3 style="font-size: 55px; color: #ffdd59; margin: 10px 0;" id="student-score">0 / 0</h3>
            </div>
            
            <div class="qr-simulation">
                <p style="margin-top:0; color:#4ecca3;">📷 교실에 숨겨진 보물 QR코드를 찾으면 아래 버튼을 누르세요.</p>
                <button onclick="openScanner()" style="font-size:18px; padding:15px 25px; background-color:#4ecca3;">보물 QR코드 스캔하기 📸</button>
            </div>
            
            <div id="mission-complete" class="hidden" style="background:#e94560; padding:20px; border-radius:5px; margin-top:20px;">
                <h3 style="margin:0; font-size:24px;">🎉 보물 지도 완성! 🎉</h3>
                <p style="font-size:18px; margin:10px 0;" id="reward-card-text"></p>
                <p style="font-weight:bold; color:#ffdd59; margin:0;">⚠️ 이제 자기 컴퓨터 자리에 예쁘게 앉아서 친구들을 기다리세요!</p>
            </div>
        </div>

        <div id="scanner-screen" class="hidden">
            <h2>📷 보물 QR 코드 스캔 중...</h2>
            <p>태블릿 카메라를 QR코드에 가까이 대 주세요.</p>
            <div class="scanner-view">
                <div class="scanner-laser"></div>
                <p style="color:#4ecca3; font-size:20px; font-weight:bold; margin:40px 0;">[ 렌즈 정렬 중... ]</p>
            </div>
            <p style="color:#aaa; font-size:14px;">몇 번 보물 QR 코드를 찍었나요? (테스트용 선택)</p>
            <select id="qr-number-select" style="padding:10px; font-size:16px; border-radius:5px;">
                <option value="1">1번 보물 QR</option>
                <option value="2">2번 보물 QR</option>
                <option value="3">3번 보물 QR</option>
                <option value="4">4번 보물 QR</option>
                <option value="5">5번 보물 QR</option>
            </select>
            <button onclick="processScan()" style="background:#4ecca3; margin-left:10px;">스캔 완료</button>
            <br>
            <button onclick="closeScanner()" style="background:#555; margin-top:15px; font-size:14px; padding:5px 10px;">취소하고 돌아가기</button>
        </div>

        <div id="admin-screen" class="hidden">
            <h2>📊 실시간 탐험대 현황 (이시연 선생님 전용)</h2>
            <table class="dashboard-table">
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>진행도</th>
                    </tr>
                </thead>
                <tbody id="dashboard-body"></tbody>
            </table>
            <button onclick="resetData()" style="margin-top:20px; background-color:#555;">전체 데이터 초기화</button>
        </div>
    </div>

    <script>
        const studentInfo = {
            "김제이": { target: 5, color: "초록" },
            "정현우": { target: 5, color: "초록" },
            "우승민": { target: 4, color: "노란" },
            "이천희": { target: 4, color: "노란" },
            "권규태": { target: 3, color: "빨간" },
            "김채연": { target: 3, color: "빨간" }
        };

        const firebaseConfig = {
            databaseURL: "https://open-class-2026-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentStudent = "";
        let scannedHistory = []; // 현재 학생이 찍은 QR 번호 저장 배열

        function login() {
            const input = document.getElementById("username-input").value.replace(/\s+/g, "");
            if (!input) return;

            if (input === "admin" || input === "선생님" || input === "이시연") {
                showAdminScreen();
            } else if (studentInfo[input]) {
                currentStudent = input;
                showStudentScreen();
            } else {
                alert("등록되지 않은 이름입니다. 명단을 확인해 주세요!");
            }
        }

        function showStudentScreen() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("scanner-screen").classList.add("hidden");
            document.getElementById("student-screen").classList.remove("hidden");
            document.getElementById("student-welcome").innerText = `👨‍🚀 ${currentStudent} 대원 환영합니다!`;
            document.getElementById("student-target").innerText = `목표: 보물 코드를 [ ${studentInfo[currentStudent].target}개 ] 찾으세요!`;
            
            // 파이어베이스에서 실시간 스캔 기록 가져오기
            db.ref('missions/' + currentStudent).on('value', (snapshot) => {
                let data = snapshot.val() || { score: 0, qrList: "" };
                let score = data.score || 0;
                let qrListStr = data.qrList || "";
                scannedHistory = qrListStr ? qrListStr.split(",") : [];

                let target = studentInfo[currentStudent].target;
                document.getElementById("student-score").innerText = `${score} / ${target}`;
                
                if (score >= target) {
                    document.getElementById("mission-complete").classList.remove("hidden");
                    document.getElementById("reward-card-text").innerText = `교실 뒤 바구니에서 [ ${studentInfo[currentStudent].color}색 미션 카드 ]를 한 장 가져가세요!`;
                } else {
                    document.getElementById("mission-complete").classList.add("hidden");
                }
            });
        }

        function openScanner() {
            document.getElementById("student-screen").classList.add("hidden");
            document.getElementById("scanner-screen").classList.remove("hidden");
        }

        function closeScanner() {
            document.getElementById("scanner-screen").classList.add("hidden");
            document.getElementById("student-screen").classList.remove("hidden");
        }

        function processScan() {
            const qrNum = document.getElementById("qr-number-select").value;
            let target = studentInfo[currentStudent].target;

            // 중복 체크: 이미 배열에 있는 번호인지 확인
            if (scannedHistory.includes(qrNum)) {
                alert(`⚠️ 이미 찾은 ${qrNum}번 보물입니다! 다른 QR 코드를 찾아보세요.`);
                closeScanner();
                return;
            }

            // 새로운 QR인 경우 처리 애니메이션 연출 후 데이터 반영
            alert(`✅ 삐빅-! 새로운 ${qrNum}번 보물 스캔 성공!`);
            
            db.ref('missions/' + currentStudent).transaction((currentData) => {
                let data = currentData || { score: 0, qrList: "" };
                let score = data.score || 0;
                let qrListStr = data.qrList || "";
                let list = qrListStr ? qrListStr.split(",") : [];

                if (score < target && !list.includes(qrNum)) {
                    list.push(qrNum);
                    return {
                        score: score + 1,
                        qrList: list.join(",")
                    };
                }
                return currentData; 
            }, () => {
                closeScanner();
            });
        }

        function showAdminScreen() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("admin-screen").classList.remove("hidden");
            db.ref('missions').on('value', (snapshot) => {
                let data = snapshot.val() || {};
                let tbody = document.getElementById("dashboard-body");
                tbody.innerHTML = "";
                for (let name in studentInfo) {
                    let studentData = data[name] || { score: 0 };
                    let current = studentData.score || 0;
                    let target = studentInfo[name].target;
                    let percent = Math.min((current / target) * 100, 100);
                    tbody.innerHTML += `<tr><td><strong>${name}</strong></td><td><div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div><span>${current}/${target}</span></td></tr>`;
                }
            });
        }

        function resetData() {
            if (confirm("모든 데이터를 초기화하시겠습니까?")) {
                let resetObj = {};
                for (let name in studentInfo) {
                    resetObj[name] = { score: 0, qrList: "" };
                }
                db.ref('missions').set(resetObj, () => alert("초기화되었습니다!"));
            }
        }
    </script>
</body>
</html>
